<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Watchlist Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { margin: 5px; padding: 10px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .log { background: #f8f9fa; padding: 10px; margin: 10px 0; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Frontend Watchlist Test</h1>
    
    <div class="test-section">
        <h2>🔑 Authentication Test</h2>
        <button onclick="testAuth()">Test Authentication</button>
        <button onclick="checkToken()">Check Token</button>
        <button onclick="clearToken()">Clear Token</button>
        <div id="auth-log" class="log"></div>
    </div>

    <div class="test-section">
        <h2>📝 Watchlist Test</h2>
        <button onclick="testAddToWatchlist()">Add to Watchlist</button>
        <button onclick="testGetWatchlist()">Get Watchlist</button>
        <button onclick="testRemoveFromWatchlist()">Remove from Watchlist</button>
        <div id="watchlist-log" class="log"></div>
    </div>

    <div class="test-section">
        <h2>📺 Watch History Test</h2>
        <button onclick="testUpdateWatchHistory()">Update Watch History</button>
        <button onclick="testGetWatchHistory()">Get Watch History</button>
        <button onclick="testGetWatchStats()">Get Watch Stats</button>
        <div id="history-log" class="log"></div>
    </div>

    <div class="test-section">
        <h2>🔧 API Configuration Test</h2>
        <button onclick="testApiConfig()">Test API Config</button>
        <button onclick="testBackendConnectivity()">Test Backend Connectivity</button>
        <div id="config-log" class="log"></div>
    </div>

    <script>
        // Mock localStorage for testing
        if (typeof localStorage === 'undefined') {
            window.localStorage = {
                getItem: (key) => window.localStorageData?.[key] || null,
                setItem: (key, value) => {
                    if (!window.localStorageData) window.localStorageData = {};
                    window.localStorageData[key] = value;
                },
                removeItem: (key) => {
                    if (window.localStorageData) delete window.localStorageData[key];
                }
            };
        }

        // Mock fetch for testing
        const originalFetch = window.fetch;
        let mockResponses = {};

        function log(section, message, type = 'info') {
            const logElement = document.getElementById(section + '-log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type;
            logElement.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logElement.scrollTop = logElement.scrollTop + 1000;
        }

        // Test authentication
        function testAuth() {
            log('auth', 'Testing authentication...', 'info');
            
            const token = localStorage.getItem('token');
            if (token) {
                log('auth', `✅ Token found: ${token.substring(0, 20)}...`, 'success');
            } else {
                log('auth', '❌ No token found. User needs to log in.', 'error');
            }
        }

        function checkToken() {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const expiry = new Date(payload.exp * 1000);
                    const now = new Date();
                    
                    log('auth', `Token expires: ${expiry.toLocaleString()}`, 'info');
                    log('auth', `Current time: ${now.toLocaleString()}`, 'info');
                    
                    if (expiry > now) {
                        log('auth', '✅ Token is valid', 'success');
                    } else {
                        log('auth', '❌ Token has expired', 'error');
                    }
                } catch (e) {
                    log('auth', '❌ Invalid token format', 'error');
                }
            } else {
                log('auth', '❌ No token to check', 'error');
            }
        }

        function clearToken() {
            localStorage.removeItem('token');
            log('auth', '🗑️ Token cleared', 'info');
        }

        // Test API configuration
        function testApiConfig() {
            log('config', 'Testing API configuration...', 'info');
            
            // Simulate the API config
            const API_CONFIG = {
                mode: 'local',
                local: 'http://localhost:3001/api',
                deployed: 'https://streamr-jjj9.onrender.com/api'
            };
            
            log('config', `Current mode: ${API_CONFIG.mode}`, 'info');
            log('config', `Local URL: ${API_CONFIG.local}`, 'info');
            log('config', `Deployed URL: ${API_CONFIG.deployed}`, 'info');
            
            const currentUrl = API_CONFIG[API_CONFIG.mode];
            log('config', `Using URL: ${currentUrl}`, 'success');
        }

        function testBackendConnectivity() {
            log('config', 'Testing backend connectivity...', 'info');
            
            const testUrl = 'http://localhost:3001/api/user/watchlist';
            
            fetch(testUrl, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token') || 'test'}`
                }
            })
            .then(response => {
                log('config', `Response status: ${response.status}`, 'info');
                return response.json();
            })
            .then(data => {
                if (data.success === false && data.message === 'Invalid token') {
                    log('config', '✅ Backend is reachable (authentication required)', 'success');
                } else {
                    log('config', `✅ Backend response: ${JSON.stringify(data)}`, 'success');
                }
            })
            .catch(error => {
                log('config', `❌ Backend connection failed: ${error.message}`, 'error');
            });
        }

        // Test watchlist functionality
        function testAddToWatchlist() {
            log('watchlist', 'Testing add to watchlist...', 'info');
            
            const testMovie = {
                tmdbId: 550,
                type: 'movie',
                contentData: {
                    title: 'Fight Club',
                    name: 'Fight Club',
                    overview: 'A ticking-time-bomb insomniac and a devil-may-care soapmaker form an underground fight club that evolves into something much, much more.',
                    rating: 8.8,
                    genres: ['Drama']
                }
            };
            
            const token = localStorage.getItem('token');
            if (!token) {
                log('watchlist', '❌ No authentication token. Please log in first.', 'error');
                return;
            }
            
            fetch('http://localhost:3001/api/user/watchlist', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(testMovie)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    log('watchlist', `✅ Added to watchlist: ${data.data.title}`, 'success');
                    log('watchlist', `Content ID: ${data.data.contentId}`, 'info');
                } else {
                    log('watchlist', `❌ Failed to add to watchlist: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                log('watchlist', `❌ Error: ${error.message}`, 'error');
            });
        }

        function testGetWatchlist() {
            log('watchlist', 'Testing get watchlist...', 'info');
            
            const token = localStorage.getItem('token');
            if (!token) {
                log('watchlist', '❌ No authentication token. Please log in first.', 'error');
                return;
            }
            
            fetch('http://localhost:3001/api/user/watchlist', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    log('watchlist', `✅ Watchlist retrieved: ${data.data.count} items`, 'success');
                    if (data.data.watchlist && data.data.watchlist.length > 0) {
                        data.data.watchlist.forEach(item => {
                            log('watchlist', `- ${item.title} (${item.type})`, 'info');
                        });
                    }
                } else {
                    log('watchlist', `❌ Failed to get watchlist: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                log('watchlist', `❌ Error: ${error.message}`, 'error');
            });
        }

        function testRemoveFromWatchlist() {
            log('watchlist', 'Testing remove from watchlist...', 'info');
            log('watchlist', '⚠️ This requires a valid content ID from the watchlist', 'info');
        }

        // Test watch history functionality
        function testUpdateWatchHistory() {
            log('history', 'Testing update watch history...', 'info');
            
            const testMovie = {
                tmdbId: 13,
                type: 'movie',
                progress: 75,
                contentData: {
                    title: 'Forrest Gump',
                    name: 'Forrest Gump',
                    overview: 'The presidencies of Kennedy and Johnson, the Vietnam War, the Watergate scandal and other historical events unfold from the perspective of an Alabama man with an IQ of 75.',
                    rating: 8.8,
                    genres: ['Drama', 'Romance']
                }
            };
            
            const token = localStorage.getItem('token');
            if (!token) {
                log('history', '❌ No authentication token. Please log in first.', 'error');
                return;
            }
            
            fetch('http://localhost:3001/api/user/watch-history', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(testMovie)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    log('history', `✅ Watch history updated: ${data.data.progress}%`, 'success');
                    log('history', `Content: ${data.data.title}`, 'info');
                } else {
                    log('history', `❌ Failed to update watch history: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                log('history', `❌ Error: ${error.message}`, 'error');
            });
        }

        function testGetWatchHistory() {
            log('history', 'Testing get watch history...', 'info');
            
            const token = localStorage.getItem('token');
            if (!token) {
                log('history', '❌ No authentication token. Please log in first.', 'error');
                return;
            }
            
            fetch('http://localhost:3001/api/user/watch-history', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    log('history', `✅ Watch history retrieved: ${data.data.count} items`, 'success');
                    if (data.data.watchHistory && data.data.watchHistory.length > 0) {
                        data.data.watchHistory.forEach(item => {
                            log('history', `- ${item.content.title}: ${item.progress}%`, 'info');
                        });
                    }
                } else {
                    log('history', `❌ Failed to get watch history: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                log('history', `❌ Error: ${error.message}`, 'error');
            });
        }

        function testGetWatchStats() {
            log('history', 'Testing get watch stats...', 'info');
            
            const token = localStorage.getItem('token');
            if (!token) {
                log('history', '❌ No authentication token. Please log in first.', 'error');
                return;
            }
            
            fetch('http://localhost:3001/api/user/watch-stats', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    log('history', `✅ Watch stats retrieved:`, 'success');
                    log('history', `Total watched: ${data.data.totalWatched}`, 'info');
                    log('history', `Total watchlist: ${data.data.totalWatchlist}`, 'info');
                    log('history', `Average rating: ${data.data.averageRating}`, 'info');
                } else {
                    log('history', `❌ Failed to get watch stats: ${data.message}`, 'error');
                }
            })
            .catch(error => {
                log('history', `❌ Error: ${error.message}`, 'error');
            });
        }

        // Initialize
        window.addEventListener('load', () => {
            log('auth', '🚀 Frontend Watchlist Test initialized', 'info');
            log('auth', 'Please log in to the main application first, then return here to test', 'info');
        });
    </script>
</body>
</html>
